<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>การ์ดอวยพร · ศาลเจ้า</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@300;400;600;700&family=Noto+Sans+Thai:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#c9a84c;--gold-light:#ffd97a;--text-body:'Noto Sans Thai',sans-serif;--text-serif:'Noto Serif Thai',serif}
html,body{height:100%;font-family:var(--text-body);overflow-x:hidden}
#screen-loading{position:fixed;inset:0;background:#100a02;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity 0.5s}
#screen-loading.hide{opacity:0;pointer-events:none}
.loading-icon{font-size:40px;animation:spin 1.5s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:#c9a84c77;font-size:13px;letter-spacing:2px}
#screen-disabled{display:none;min-height:100vh;background:#0d0a08;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:32px}
#screen-disabled.active{display:flex}
.disabled-icon{font-size:48px;margin-bottom:16px;opacity:0.5}
.disabled-text{color:#5a4030;font-size:14px;line-height:2}
.screen{display:none;min-height:100vh}
.screen.active{display:flex}
#screen-form{flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;background:#100a02}
.form-header{text-align:center;margin-bottom:28px}
.form-header .shrine-name{font-size:11px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-bottom:10px}
.form-header h1{font-family:var(--text-serif);font-size:24px;font-weight:600;color:#f5e6c8;line-height:1.35}
.active-theme-badge{display:inline-flex;align-items:center;gap:6px;background:#c9a84c18;border:1px solid #c9a84c33;color:var(--gold);border-radius:99px;padding:6px 14px;font-size:12px;margin-top:10px}
.form-box{background:#1c1208;border:0.5px solid #3a2810;border-radius:16px;padding:24px;width:100%;max-width:380px;box-shadow:0 24px 48px #00000066}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:7px}
.field input,.field textarea{width:100%;background:#0d0800;border:0.5px solid #3a2810;border-radius:8px;padding:12px 14px;color:#f0e0c0;font-family:var(--text-body);font-size:15px;outline:none;transition:border-color 0.2s;-webkit-appearance:none}
.field input:focus,.field textarea:focus{border-color:var(--gold)}
.field textarea{resize:none;height:88px;line-height:1.7}
.btn-create{width:100%;padding:14px;border-radius:99px;border:none;background:var(--gold);color:#0d0800;font-family:var(--text-body);font-size:15px;font-weight:500;cursor:pointer;margin-top:6px;transition:all 0.2s;letter-spacing:0.5px}
.btn-create:hover{background:var(--gold-light);transform:translateY(-1px)}
#screen-card{flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;position:relative;overflow:hidden;min-height:100vh}
#bg-canvas{position:fixed;inset:0;pointer-events:none;z-index:0}
#sparks{position:fixed;inset:0;pointer-events:none;z-index:1}
.spark{position:absolute;border-radius:50%;animation:floatUp linear infinite;opacity:0}
@keyframes floatUp{0%{transform:translateY(0) scale(1);opacity:0}10%{opacity:0.9}90%{opacity:0.2}100%{transform:translateY(-110vh) scale(0.2);opacity:0}}
.card-wrap{position:relative;z-index:10;width:100%;max-width:360px;animation:cardReveal 1s cubic-bezier(0.16,1,0.3,1) both}
@keyframes cardReveal{from{opacity:0;transform:translateY(30px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.card{border-radius:18px;border:1px solid #ffffff18;overflow:hidden;box-shadow:0 32px 80px #00000099,inset 0 1px 0 #ffffff18;position:relative}
.card::before,.card::after{content:'';position:absolute;width:50px;height:50px;border-style:solid;z-index:5;pointer-events:none}
.card::before{top:14px;left:14px;border-width:1px 0 0 1px;border-radius:4px 0 0 0}
.card::after{bottom:14px;right:14px;border-width:0 1px 1px 0;border-radius:0 0 4px 0}
.card-visual{position:relative;height:210px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.visual-glow{position:absolute;width:260px;height:260px;border-radius:50%;pointer-events:none;animation:pulseGlow 3s ease-in-out infinite}
@keyframes pulseGlow{0%,100%{transform:scale(1);opacity:0.7}50%{transform:scale(1.3);opacity:1}}
.card-body{padding:18px 28px 28px;text-align:center;position:relative;z-index:3}
.card-divider{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.card-divider-line{flex:1;height:0.5px}
.card-divider-icon{font-size:13px;animation:spinSlow 10s linear infinite}
@keyframes spinSlow{to{transform:rotate(360deg)}}
.card-to-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-bottom:5px;animation:fadeUp 0.8s 0.5s both}
.card-to-name{font-family:var(--text-serif);font-size:24px;font-weight:600;margin-bottom:16px;animation:fadeUp 0.8s 0.7s both}
.card-message{font-family:var(--text-serif);font-size:15px;font-weight:300;line-height:1.9;margin-bottom:16px;animation:fadeUp 0.8s 0.9s both}
.card-from{font-size:12px;margin-bottom:20px;animation:fadeUp 0.8s 1.1s both}
.card-from-name{font-weight:500}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card-cta{animation:fadeUp 0.8s 1.3s both}
.btn-cta{display:inline-flex;align-items:center;gap:8px;padding:10px 22px;border-radius:99px;font-size:13px;font-family:var(--text-body);cursor:pointer;text-decoration:none;transition:all 0.25s;border:1px solid}
.btn-cta:hover{transform:translateY(-1px)}
.cta-dot{width:6px;height:6px;border-radius:50%;animation:pulseDot 1.5s ease-in-out infinite}
@keyframes pulseDot{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.8);opacity:0.4}}
.card-shrine{margin-top:10px;font-size:10px;letter-spacing:2px;text-transform:uppercase;animation:fadeUp 0.8s 1.5s both}
.share-bar{display:flex;gap:10px;margin-top:20px;justify-content:center;animation:fadeUp 0.8s 1.7s both;flex-wrap:wrap}
.btn-share{padding:10px 18px;border-radius:99px;border:1px solid #ffffff22;background:#ffffff11;color:#f0e0c0;font-size:13px;font-family:var(--text-body);cursor:pointer;transition:all 0.2s}
.btn-share:hover{background:#ffffff22;transform:translateY(-1px)}
.btn-make-own{padding:10px 18px;border-radius:99px;border:1px solid #c9a84c44;background:#c9a84c18;color:var(--gold);font-size:13px;font-family:var(--text-body);cursor:pointer;transition:all 0.2s}
.btn-make-own:hover{background:#c9a84c28}
/* SVG anims */
.svg-lantern-group{animation:lanternSway 4s ease-in-out infinite;transform-origin:top center}
.lantern-alt{animation-direction:reverse;animation-delay:0.5s}
@keyframes lanternSway{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
.flame{animation:flicker 0.75s ease-in-out infinite alternate;transform-origin:bottom center}
.flame-b{animation:flicker 0.6s 0.2s ease-in-out infinite alternate;transform-origin:bottom center}
.flame-c{animation:flicker 0.9s 0.1s ease-in-out infinite alternate;transform-origin:bottom center}
@keyframes flicker{0%{transform:scaleY(1) scaleX(1) translateY(0)}100%{transform:scaleY(1.2) scaleX(0.85) translateY(-2px)}}
.lantern-shimmer{animation:shimmer 2.5s ease-in-out infinite alternate}
@keyframes shimmer{0%{filter:brightness(1)}100%{filter:brightness(1.3) saturate(1.15)}}
.splash{animation:splashAnim 1.8s ease-out infinite;transform-origin:bottom center}
.splash2{animation:splashAnim 1.8s 0.6s ease-out infinite}
.splash3{animation:splashAnim 1.8s 1.2s ease-out infinite}
@keyframes splashAnim{0%{transform:scaleY(0) scaleX(1);opacity:1}40%{transform:scaleY(1) scaleX(1);opacity:0.9}100%{transform:scaleY(1.4) scaleX(0.6) translateY(-10px);opacity:0}}
.petal{animation:petalFall linear infinite}
@keyframes petalFall{0%{transform:translateY(-20px) rotate(0deg);opacity:0}10%{opacity:0.9}90%{opacity:0.5}100%{transform:translateY(180px) rotate(360deg);opacity:0}}
.star-twinkle{animation:twinkle 2s ease-in-out infinite alternate}
@keyframes twinkle{0%{opacity:0.2;transform:scale(0.8)}100%{opacity:1;transform:scale(1.2)}}
.lotus-float{animation:lotusFloat 3s ease-in-out infinite}
@keyframes lotusFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.smoke{animation:smokeRise 3s ease-out infinite;transform-origin:bottom center}
.smoke2{animation:smokeRise 3s 1s ease-out infinite;transform-origin:bottom center}
.smoke3{animation:smokeRise 3s 2s ease-out infinite;transform-origin:bottom center}
@keyframes smokeRise{0%{transform:translateY(0) scaleX(1);opacity:0.6}100%{transform:translateY(-40px) scaleX(2);opacity:0}}
.coin-spin{animation:coinSpin 3s ease-in-out infinite}
@keyframes coinSpin{0%,100%{transform:rotateY(0deg)}50%{transform:rotateY(180deg)}}
.dragon-wave{animation:dragonWave 2s ease-in-out infinite}
@keyframes dragonWave{0%,100%{transform:translateX(0) translateY(0)}25%{transform:translateX(4px) translateY(-3px)}75%{transform:translateX(-4px) translateY(3px)}}
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);background:#1c1208ee;border:1px solid #c9a84c44;color:var(--gold);padding:12px 24px;border-radius:99px;font-size:13px;opacity:0;transition:all 0.3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="screen-loading">
  <div class="loading-icon">🏮</div>
  <div class="loading-text">กำลังโหลด...</div>
</div>
<div id="screen-disabled">
  <div class="disabled-icon">🏮</div>
  <div class="disabled-text">ขณะนี้ยังไม่มีการ์ดอวยพรที่เปิดใช้งาน<br>กรุณาติดตามข่าวสารจากศาลเจ้า</div>
</div>

<div id="screen-form" class="screen">
  <div class="form-header">
    <div class="shrine-name">ศาลเจ้า · PWA</div>
    <h1>สร้างการ์ดอวยพร<br>ส่งให้คนที่คุณรัก</h1>
    <div class="active-theme-badge" id="theme-badge">🏮 ธีมปัจจุบัน</div>
  </div>
  <div class="form-box">
    <div class="field"><label>ถึง (ชื่อผู้รับ)</label><input type="text" id="inp-to" placeholder="ชื่อผู้รับ" maxlength="30"></div>
    <div class="field"><label>ข้อความอวยพร</label><textarea id="inp-msg" placeholder="พิมพ์คำอวยพรของคุณ..."></textarea></div>
    <div class="field"><label>จาก (ชื่อผู้ส่ง)</label><input type="text" id="inp-from" placeholder="ชื่อของคุณ" maxlength="30"></div>
    <button class="btn-create" onclick="createCard()">✦ สร้างการ์ด</button>
  </div>
</div>

<div id="screen-card" class="screen">
  <canvas id="bg-canvas"></canvas>
  <div id="sparks"></div>
  <div class="card-wrap">
    <div class="card" id="the-card">
      <div class="card-visual"><div class="visual-glow" id="visual-glow"></div><div id="visual-content"></div></div>
      <div class="card-body">
        <div class="card-divider"><div class="card-divider-line" id="div-line-l"></div><div class="card-divider-icon" id="div-icon">✦</div><div class="card-divider-line" id="div-line-r"></div></div>
        <div class="card-to-label" id="lbl-to-label">ถึง</div>
        <div class="card-to-name" id="lbl-to-name">—</div>
        <div class="card-message" id="lbl-message">—</div>
        <div class="card-from" id="lbl-from">จาก <span class="card-from-name" id="lbl-from-name">—</span></div>
        <div class="card-cta"><a class="btn-cta" id="btn-cta-main" href="#" onclick="goForm(event)"><div class="cta-dot" id="cta-dot"></div>ส่งพรให้คนที่คุณรัก</a></div>
        <div class="card-shrine" id="lbl-shrine">ศาลเจ้า · PWA</div>
      </div>
    </div>
    <div class="share-bar">
      <button class="btn-share" onclick="copyLink()">📋 คัดลอก link</button>
      <button class="btn-share" onclick="shareNative()">↗ แชร์</button>
      <button class="btn-make-own" onclick="goForm(null)">✦ สร้างของฉัน</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

let activeTheme='general', activeCtaUrl='./', animFrame, sparksReady=false;

async function init(){
  try{
    const snap=await db.collection('settings').doc('greetingCard').get();
    const loading=document.getElementById('screen-loading');
    if(!snap.exists||snap.data().enabled===false){
      loading.classList.add('hide');
      setTimeout(()=>loading.style.display='none',500);
      document.getElementById('screen-disabled').classList.add('active');
      return;
    }
    const d=snap.data();
    activeTheme=THEMES[d.theme]?d.theme:'general';
    activeCtaUrl=d.ctaUrl||'./';
    document.getElementById('theme-badge').textContent=THEMES[activeTheme].label;
    document.getElementById('inp-msg').placeholder=THEMES[activeTheme].defaultMsg.split('\n')[0]+'...';
    document.body.style.background=THEMES[activeTheme].bg;
    loading.classList.add('hide');
    setTimeout(()=>loading.style.display='none',500);
    if(!readParams()) document.getElementById('screen-form').classList.add('active');
  }catch(e){
    console.error(e);
    activeTheme='general';
    document.getElementById('screen-loading').classList.add('hide');
    setTimeout(()=>document.getElementById('screen-loading').style.display='none',500);
    document.getElementById('screen-form').classList.add('active');
  }
}

function readParams(){
  const p=new URLSearchParams(location.search);
  if(p.get('to')){
    const theme=THEMES[p.get('theme')]?p.get('theme'):activeTheme;
    showCard(theme,p.get('to'),p.get('msg')||THEMES[theme].defaultMsg,p.get('from')||'ผู้ส่งที่รักคุณ');
    return true;
  }
  return false;
}

function createCard(){
  const to=document.getElementById('inp-to').value.trim()||'คุณ';
  const msg=document.getElementById('inp-msg').value.trim()||THEMES[activeTheme].defaultMsg;
  const from=document.getElementById('inp-from').value.trim()||'ผู้ส่งที่รักคุณ';
  showCard(activeTheme,to,msg,from);
}

function showCard(themeKey,to,msg,from){
  const t=THEMES[themeKey];
  const url=new URL(location.href);
  url.search='';
  url.searchParams.set('theme',themeKey);
  url.searchParams.set('to',to);
  url.searchParams.set('msg',msg);
  url.searchParams.set('from',from);
  history.pushState({},''  ,url);
  document.body.style.background=t.bg;
  const card=document.getElementById('the-card');
  card.style.background=t.cardBg;
  card.style.borderColor=t.cardBorder;
  const se=document.createElement('style');
  se.textContent=`#the-card::before,#the-card::after{border-color:${t.cornerBorder}!important}#screen-card{background:${t.bg}}`;
  document.head.appendChild(se);
  document.getElementById('visual-glow').style.background=`radial-gradient(circle,${t.glowColor} 0%,transparent 70%)`;
  document.getElementById('div-line-l').style.background=t.divLineColor;
  document.getElementById('div-line-r').style.background=t.divLineColor;
  document.getElementById('div-icon').style.color=t.divIconColor;
  document.getElementById('div-icon').textContent=t.divIcon;
  document.getElementById('lbl-to-label').style.color=t.toLabelColor;
  document.getElementById('lbl-to-name').style.color=t.toNameColor;
  document.getElementById('lbl-to-name').style.textShadow=t.toNameShadow;
  document.getElementById('lbl-to-name').textContent=to;
  document.getElementById('lbl-message').style.color=t.messageColor;
  document.getElementById('lbl-message').innerHTML=msg.replace(/\n/g,'<br>');
  document.getElementById('lbl-from').style.color=t.fromColor;
  document.getElementById('lbl-from-name').style.color=t.fromNameColor;
  document.getElementById('lbl-from-name').textContent=from;
  document.getElementById('lbl-shrine').style.color=t.shrineColor;
  const cta=document.getElementById('btn-cta-main');
  cta.style.background=t.ctaBg; cta.style.borderColor=t.ctaBorder; cta.style.color=t.ctaColor;
  cta.href=activeCtaUrl;
  document.getElementById('cta-dot').style.background=t.ctaDot;
  document.getElementById('visual-content').innerHTML=document.getElementById(t.tplId).innerHTML;
  document.getElementById('screen-form').classList.remove('active');
  document.getElementById('screen-card').classList.add('active');
  startCanvas(t);
  if(!sparksReady){createSparks(t);sparksReady=true;}
}

function startCanvas(t){
  if(animFrame) cancelAnimationFrame(animFrame);
  const canvas=document.getElementById('bg-canvas');
  canvas.width=innerWidth; canvas.height=innerHeight;
  const ctx=canvas.getContext('2d');
  const[r,g,b]=t.particleColor;
  const bits=Array.from({length:28},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2.5+0.5,vy:-(Math.random()*0.5+0.15),vx:(Math.random()-0.5)*0.3,a:Math.random()*0.5+0.08,p:Math.random()*Math.PI*2}));
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    bits.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.p+=0.018;if(p.y<-10){p.y=canvas.height+10;p.x=Math.random()*canvas.width;}ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(${r},${g},${b},${p.a*(0.5+0.5*Math.sin(p.p))})`;ctx.fill();});
    animFrame=requestAnimationFrame(draw);
  }
  draw();
}

function createSparks(t){
  const el=document.getElementById('sparks');
  for(let i=0;i<18;i++){
    const s=document.createElement('div');s.className='spark';
    const sz=Math.random()*3.5+1.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;bottom:${-10+Math.random()*20}%;background:radial-gradient(circle,${t.sparkColor} 0%,transparent 100%);animation-duration:${Math.random()*5+5}s;animation-delay:${Math.random()*6}s;`;
    el.appendChild(s);
  }
}

function copyLink(){navigator.clipboard.writeText(location.href).then(()=>showToast('คัดลอก link แล้ว ✓')).catch(()=>showToast('กรุณาคัดลอก URL ด้านบน'));}
function shareNative(){if(navigator.share)navigator.share({title:'การ์ดอวยพรจากศาลเจ้า',text:'มีของขวัญสำหรับคุณ 🏮',url:location.href});else copyLink();}
function goForm(e){if(e)e.preventDefault();document.getElementById('screen-card').classList.remove('active');document.getElementById('screen-form').classList.add('active');history.pushState({},'',location.pathname);}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
window.addEventListener('resize',()=>{const c=document.getElementById('bg-canvas');if(c){c.width=innerWidth;c.height=innerHeight;}});
init();
</script>
</body>
