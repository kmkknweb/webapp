<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เปิดคำอธิษฐาน</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Kanit',sans-serif;
  background:radial-gradient(circle,#8f1d1d,#1a0303);
  color:#fff;
  overflow:hidden;
}

/* ฉากหลัง particle */
canvas{
  position:fixed;
  top:0;
  left:0;
}

/* layout */
.container{
  position:relative;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

/* อากง */
.agong{
  width:150px;
  animation:float 3s infinite ease-in-out;
  filter:drop-shadow(0 0 40px gold);
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-15px)}
}

/* input */
input{
  padding:15px;
  border-radius:15px;
  border:none;
  margin-top:20px;
  text-align:center;
  font-size:18px;
  text-transform:uppercase;
}

/* ปุ่ม */
button{
  margin-top:15px;
  padding:15px 30px;
  border:none;
  border-radius:999px;
  font-size:18px;
  background:linear-gradient(#fff0b3,#f1b93f);
  box-shadow:0 0 30px rgba(255,200,100,.8);
  cursor:pointer;
  transition:.3s;
}
button:hover{
  transform:scale(1.1);
}

/* overlay */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.light{
  width:200px;
  height:200px;
  border-radius:50%;
  background:radial-gradient(circle,gold,transparent);
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.4)}
}

/* card */
.card{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:#fff4cf;
  color:#4b220b;
  padding:30px;
  border-radius:25px;
  width:90%;
  max-width:420px;
  transition:.6s;
}

.card.show{
  transform:translate(-50%,-50%) scale(1);
}

.quote{
  font-size:22px;
  margin-top:20px;
  line-height:1.6;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">
  <img src="images/agong.png" class="agong">
  <h1>เปิดคำอธิษฐาน</h1>

  <input id="codeInput" placeholder="TC-2026-XXXXX">
  <button onclick="openCapsule()">✨ เปิดโคม</button>
</div>

<div class="overlay" id="overlay">
  <div class="light"></div>
  <h2>กำลังเปิดคำอธิษฐาน...</h2>
</div>

<div class="card" id="card">
  <h2>คำอธิษฐานของคุณ</h2>
  <div class="quote" id="wish"></div>
</div>

<audio id="gong" src="gong.mp3"></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "timecapsule-64914.firebaseapp.com",
  projectId: "timecapsule-64914"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* type effect */
function typeText(text, el){
  let i=0;
  el.innerHTML="";
  function t(){
    if(i<text.length){
      el.innerHTML+=text[i];
      i++;
      setTimeout(t,40);
    }
  }
  t();
}

/* main */
window.openCapsule = async function(){
  const code = document.getElementById("codeInput").value.toUpperCase();
  const overlay = document.getElementById("overlay");
  const card = document.getElementById("card");

  overlay.style.display="flex";
  document.getElementById("gong").play();

  const q = query(collection(db,"timeCapsules"),where("code","==",code));
  const snap = await getDocs(q);

  if(snap.empty){
    overlay.style.display="none";
    alert("ไม่พบรหัส");
    return;
  }

  const data = snap.docs[0].data();
  const unlockAt = data.unlockAt.toDate();

  if(new Date() < unlockAt){
    overlay.style.display="none";
    alert("ยังไม่ถึงเวลา");
    return;
  }

  setTimeout(()=>{
    overlay.style.display="none";
    card.classList.add("show");
    typeText(data.wish,document.getElementById("wish"));
  },1500);
}

/* particle background */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for(let i=0;i<80;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2+1,
    dy:Math.random()*1
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="rgba(255,200,100,0.5)";
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
    p.y-=p.dy;
    if(p.y<0) p.y=canvas.height;
  });
  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
