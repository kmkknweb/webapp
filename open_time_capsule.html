<!DOCTYPE html><html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เปิด Time Capsule</title><link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>
body {
  margin:0;
  font-family: 'Kanit', sans-serif;
  background: linear-gradient(135deg,#4b1111,#b97822);
  color:#fff;
  text-align:center;
  padding:30px;
}

h1{
  font-size:38px;
  margin-bottom:10px;
}

.subtitle{
  opacity:.85;
  margin-bottom:30px;
}

.container{
  max-width:420px;
  margin:auto;
  background:rgba(255,255,255,0.1);
  padding:25px;
  border-radius:20px;
  backdrop-filter:blur(10px);
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  margin-bottom:15px;
  font-size:16px;
  text-transform:uppercase;
}

button{
  width:100%;
  padding:14px;
  border-radius:999px;
  border:none;
  background:linear-gradient(180deg,#ffe7a0,#f1b93f);
  font-weight:600;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  transform:scale(1.03);
}

.msg{
  margin-top:20px;
  font-size:15px;
}

.card{
  display:none;
  margin-top:25px;
  padding:25px;
  border-radius:20px;
  background:linear-gradient(160deg,#4a0f0f,#841b1b 60%,#b97822);
  box-shadow:0 15px 50px rgba(0,0,0,0.5);
}

.quote{
  font-size:20px;
  line-height:1.7;
  margin:15px 0;
}

.name{
  opacity:.85;
}

.glow{
  animation: glow 2s infinite alternate;
}

@keyframes glow{
  from{box-shadow:0 0 10px rgba(255,200,100,.3)}
  to{box-shadow:0 0 30px rgba(255,200,100,.9)}
}

</style></head><body><h1>🔓 เปิดคำอธิษฐาน</h1>
<div class="subtitle">จากอดีต…สู่วันนี้</div><div class="container">
  <input id="codeInput" placeholder="TC-2026-XXXXX">
  <button onclick="openCapsule()">เปิด Time Capsule</button>
  <div class="msg" id="msg"></div>
</div><div class="card glow" id="card">
  <h2>คำอธิษฐานของคุณ</h2>
  <div class="quote" id="wish"></div>
  <div class="name" id="name"></div>
</div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBkGyIgB-LJci9yRx-C--ahW4yDngUYpZI",
  authDomain: "timecapsule-64914.firebaseapp.com",
  projectId: "timecapsule-64914",
  storageBucket: "timecapsule-64914.firebasestorage.app",
  messagingSenderId: "296891105342",
  appId: "1:296891105342:web:1c3ac75064023e90ba116f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.openCapsule = async function(){
  const code = document.getElementById("codeInput").value.trim().toUpperCase();
  const msg = document.getElementById("msg");
  const card = document.getElementById("card");

  msg.innerText = "กำลังค้นหา...";
  card.style.display = "none";

  const q = query(collection(db, "timeCapsules"), where("code","==",code));
  const snap = await getDocs(q);

  if(snap.empty){
    msg.innerText = "❌ ไม่พบรหัส";
    return;
  }

  const data = snap.docs[0].data();
  const unlockAt = data.unlockAt.toDate();
  const now = new Date();

  if(now < unlockAt){
    msg.innerText = "⏳ ยังไม่ถึงเวลาเปิด";
    return;
  }

  document.getElementById("wish").innerText = data.wish;
  document.getElementById("name").innerText = data.name || "";

  card.style.display = "block";
  msg.innerText = "";
};
</script></body>
</html>
