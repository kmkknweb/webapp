<!DOCTYPE html><html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เปิดคำอธิษฐาน</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>
body{
  margin:0;
  font-family:'Kanit',sans-serif;
  background:radial-gradient(circle,#8f1d1d,#1a0303);
  color:#fff;
  overflow:hidden;
}

.container{
  position:relative;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.agong{
  width:140px;
  transition:.6s;
  animation:float 3s infinite ease-in-out;
}

.agong.top{
  position:absolute;
  top:40px;
  width:90px;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-12px)}
}

input{
  padding:15px;
  border-radius:15px;
  border:none;
  margin-top:20px;
  text-align:center;
  font-size:18px;
  text-transform:uppercase;
}

button{
  margin-top:12px;
  padding:15px 30px;
  border:none;
  border-radius:999px;
  font-size:18px;
  background:linear-gradient(#fff0b3,#f1b93f);
  box-shadow:0 0 25px rgba(255,200,100,.7);
  cursor:pointer;
  transition:.3s;
}

button:hover{
  transform:scale(1.08);
}

.secondary{
  background:rgba(255,255,255,0.2);
  color:#fff;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.light{
  width:150px;
  height:150px;
  border-radius:50%;
  background:radial-gradient(circle,gold,transparent);
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.3)}
}

.card{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:#fff4cf;
  color:#4b220b;
  padding:30px;
  border-radius:25px;
  width:90%;
  max-width:420px;
  transition:.6s;
  text-align:center;
}

.card.show{
  transform:translate(-50%,-50%) scale(1);
}

.quote{
  font-size:22px;
  margin-top:20px;
}

.close{
  margin-top:15px;
  background:#8f1d1d;
  color:#fff;
}

</style></head><body><div class="container">
  <img src="images/agong.png" class="agong" id="agong">
  <h1>เปิดคำอธิษฐาน</h1>  <input id="codeInput" placeholder="TC-2026-XXXXX"><button onclick="openCapsule()">✨ เปิดโคม</button>

<button class="secondary" onclick="goRecover()">🔍 ค้นหารหัสเดิม</button>

</div><div class="overlay" id="overlay">
  <div class="light"></div>
  <h2>กำลังเปิดคำอธิษฐาน...</h2>
</div><div class="card" id="card">
  <h2>คำอธิษฐานของคุณ</h2>
  <div class="quote" id="wish"></div>
  <button class="close" onclick="closeCard()">ปิด</button>
</div><audio id="gong" src="gong.mp3"></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "timecapsule-64914.firebaseapp.com",
  projectId: "timecapsule-64914"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function typeText(text, el){
  let i=0;
  el.innerHTML="";
  function t(){
    if(i<text.length){
      el.innerHTML+=text[i];
      i++;
      setTimeout(t,40);
    }
  }
  t();
}

window.openCapsule = async function(){
  const code = document.getElementById("codeInput").value.toUpperCase();
  const overlay = document.getElementById("overlay");
  const card = document.getElementById("card");
  const agong = document.getElementById("agong");
  const audio = document.getElementById("gong");

  overlay.style.display="flex";
  audio.pause(); audio.currentTime=0; audio.play();

  const q = query(collection(db,"timeCapsules"),where("code","==",code));
  const snap = await getDocs(q);

  if(snap.empty){
    overlay.style.display="none";
    alert("ไม่พบรหัส");
    return;
  }

  const data = snap.docs[0].data();
  const unlockAt = data.unlockAt.toDate();

  if(new Date() < unlockAt){
    overlay.style.display="none";
    alert("ยังไม่ถึงเวลา");
    return;
  }

  setTimeout(()=>{
    overlay.style.display="none";
    card.classList.add("show");
    agong.classList.add("top");
    typeText(data.wish,document.getElementById("wish"));
  },1200);
}

window.closeCard = function(){
  document.getElementById("card").classList.remove("show");
  document.getElementById("agong").classList.remove("top");

  const audio = document.getElementById("gong");
  audio.pause();
  audio.currentTime=0;
}

window.goRecover = function(){
  window.location.href = "recover.html";
}

</script></body>
</html>
