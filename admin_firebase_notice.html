<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Notice</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body{margin:0;font-family:'Kanit',sans-serif;background:radial-gradient(circle at top,#44101f 0%,#1a1020 34%,#0d0b10 100%);color:#fff;padding:18px}
    .wrap{max-width:520px;margin:0 auto}
    .card{background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.04));border:1px solid rgba(255,255,255,.09);border-radius:24px;padding:18px;box-shadow:0 18px 40px rgba(0,0,0,.38);margin-bottom:14px}
    h1,h2{margin-top:0}
    label{display:block;margin-top:8px;margin-bottom:4px}
    input,textarea,select{width:100%;padding:12px;border-radius:12px;border:none;background:#2a2230;color:#fff;font:inherit}
    textarea{min-height:140px;resize:vertical}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    button{width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#f2c46b,#ffe5b1);color:#23160d;font:inherit;font-weight:700;cursor:pointer;margin-top:12px}
    .secondary{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.09)}
    .status{font-size:14px;color:#ffe5b1}
    @media (max-width:420px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>จัดการ Notice</h1>
      <p>พิมพ์แล้วกดบันทึก ข้อความจะขึ้นที่หน้าแอปแบบ realtime</p>

      <div class="grid">
        <div>
          <label for="version">Version</label>
          <input id="version" type="number" value="1" />
        </div>
        <div>
          <label for="show">การแสดงผล</label>
          <select id="show">
            <option value="true">แสดง</option>
            <option value="false">ซ่อน</option>
          </select>
        </div>
      </div>

      <label for="title">หัวข้อ</label>
      <input id="title" type="text" placeholder="หัวข้อ notice" />

      <label for="message">ข้อความ</label>
      <textarea id="message" placeholder="ข้อความ notice"></textarea>

      <button id="saveBtn">บันทึก Notice</button>
      <button id="loadBtn" class="secondary">โหลดค่าปัจจุบัน</button>

      <p class="status" id="statusText">พร้อมใช้งาน</p>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCLr6yKfOOnR2IqBQc2ytCEpMuTTrgcZ9Q",
      authDomain: "webapp-5a606.firebaseapp.com",
      projectId: "webapp-5a606",
      storageBucket: "webapp-5a606.firebasestorage.app",
      messagingSenderId: "4647661737",
      appId: "1:4647661737:web:5729d78923c3b5b53739b8",
      measurementId: "G-N88YXXZW34"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    function setStatus(text){
      document.getElementById('statusText').textContent = text;
    }

    async function loadNotice(){
      try{
        setStatus('กำลังโหลด...');
        const doc = await db.collection("settings").doc("notice").get();
        if(!doc.exists){
          setStatus('ยังไม่มีข้อมูล notice');
          return;
        }
        const data = doc.data();
        document.getElementById('version').value = data.version ?? 1;
        document.getElementById('show').value = String(data.show);
        document.getElementById('title').value = data.title || '';
        document.getElementById('message').value = data.message || '';
        setStatus('โหลดข้อมูลสำเร็จ');
      }catch(e){
        setStatus('โหลดข้อมูลไม่สำเร็จ');
        console.error(e);
      }
    }

    async function saveNotice(){
      try{
        setStatus('กำลังบันทึก...');
        const data = {
          version: Number(document.getElementById('version').value || 1),
          show: document.getElementById('show').value === 'true',
          title: document.getElementById('title').value.trim(),
          message: document.getElementById('message').value.trim(),
          updatedAt: new Date().toISOString()
        };

        await db.collection("settings").doc("notice").set(data);
        setStatus('บันทึกสำเร็จ');
        alert('บันทึก Notice สำเร็จ');
      }catch(e){
        setStatus('บันทึกไม่สำเร็จ');
        console.error(e);
        alert('บันทึกไม่สำเร็จ');
      }
    }

    document.getElementById('saveBtn').addEventListener('click', saveNotice);
    document.getElementById('loadBtn').addEventListener('click', loadNotice);
    loadNotice();
  </script>
</body>
</html>
