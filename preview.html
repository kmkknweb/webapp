<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preview ธีมการ์ดทั้งหมด · ศาลเจ้าปึงเถ่ากงม่า</title>
<script src="themes.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Kanit',sans-serif;background:#0a0800;color:#f0e0c0;min-height:100vh}

/* Header */
.header{
  background:linear-gradient(180deg,#1a0e02 0%,#0a0800 100%);
  border-bottom:1px solid #c9a84c22;
  padding:24px 24px 20px;
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(10px);
}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header-title{display:flex;align-items:center;gap:12px}
.header-icon{font-size:28px}
.header-text h1{font-size:18px;font-weight:700;color:#ffd97a;line-height:1.2}
.header-text p{font-size:12px;color:#c9a84c77;margin-top:2px}
.theme-count{background:#c9a84c18;border:1px solid #c9a84c33;color:#c9a84c;padding:6px 14px;border-radius:99px;font-size:13px;font-weight:500}

/* Filter bar */
.filter-bar{max-width:1400px;margin:0 auto;padding:16px 24px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-label{font-size:12px;color:#7a5a30;margin-right:4px;font-weight:500}
.filter-btn{
  padding:7px 16px;border-radius:99px;border:1px solid #3a2810;
  background:transparent;color:#8a7050;font-family:'Kanit',sans-serif;font-size:13px;
  cursor:pointer;transition:all .2s;font-weight:400;
}
.filter-btn:hover{border-color:#c9a84c55;color:#c9a84c}
.filter-btn.active{background:#c9a84c18;border-color:#c9a84c55;color:#ffd97a;font-weight:600}

/* Search */
.search-wrap{margin-left:auto}
.search-input{
  background:#1a1005;border:1px solid #3a2810;border-radius:10px;
  padding:8px 14px;color:#f0e0c0;font-family:'Kanit',sans-serif;font-size:13px;
  outline:none;width:200px;transition:border-color .2s;
}
.search-input:focus{border-color:#c9a84c55}
.search-input::placeholder{color:#5a4020}

/* Grid */
.grid-wrap{max-width:1400px;margin:0 auto;padding:8px 24px 48px}
.cat-section{margin-bottom:40px}
.cat-title{
  font-size:15px;font-weight:700;color:#ffd97a;
  padding:10px 0 14px;border-bottom:1px solid #2a1a08;
  margin-bottom:20px;display:flex;align-items:center;gap:8px;
}
.cat-count{font-size:12px;color:#7a5a30;font-weight:400}
.theme-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}

/* Card preview */
.theme-card{
  border-radius:16px;overflow:hidden;cursor:pointer;
  transition:transform .2s,box-shadow .2s;
  position:relative;border:1px solid #2a1a08;
}
.theme-card:hover{transform:translateY(-4px);box-shadow:0 16px 40px #00000066}
.theme-card.hidden{display:none}

/* Card preview visual */
.card-preview-top{
  height:140px;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.card-preview-badge{
  position:absolute;top:8px;right:8px;
  background:#00000055;backdrop-filter:blur(4px);
  border:1px solid #ffffff18;border-radius:6px;
  padding:3px 8px;font-size:10px;color:#ffffff99;
  font-weight:400;
}
.card-preview-icon{font-size:36px;position:relative;z-index:2}
.card-glow-bg{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
}
.card-glow-circle{
  width:80px;height:80px;border-radius:50%;
  animation:previewPulse 2.5s ease-in-out infinite;
}
@keyframes previewPulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.3);opacity:.8}}

/* Card preview body */
.card-preview-body{padding:14px 16px 16px}
.card-preview-label{font-size:14px;font-weight:600;line-height:1.3;margin-bottom:4px}
.card-preview-occasion{font-size:11px;opacity:.55;font-weight:300;margin-bottom:10px}
.card-preview-msg{
  font-size:11px;opacity:.45;line-height:1.7;font-weight:300;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
}
.card-preview-footer{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:10px;padding-top:10px;border-top:1px solid;
}
.card-preview-key{font-size:10px;opacity:.35;font-family:monospace}
.card-preview-use-btn{
  padding:5px 12px;border-radius:99px;border:none;
  font-family:'Kanit',sans-serif;font-size:11px;font-weight:600;
  cursor:pointer;transition:all .2s;
}
.card-preview-use-btn:hover{filter:brightness(1.15)}

/* Modal */
.modal-overlay{
  position:fixed;inset:0;background:#00000099;z-index:200;
  display:flex;align-items:center;justify-content:center;padding:20px;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal-box{
  background:#1a1005;border:1px solid #c9a84c33;border-radius:20px;
  padding:28px;max-width:420px;width:100%;
  transform:translateY(20px);transition:transform .25s;
  max-height:90vh;overflow-y:auto;
}
.modal-overlay.show .modal-box{transform:translateY(0)}
.modal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.modal-title{font-size:18px;font-weight:700;color:#ffd97a;line-height:1.3}
.modal-close{
  width:32px;height:32px;border-radius:50%;border:1px solid #3a2810;
  background:transparent;color:#8a7050;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;flex-shrink:0;margin-left:12px;
}
.modal-close:hover{border-color:#c9a84c;color:#c9a84c}
.modal-preview-card{
  border-radius:16px;overflow:hidden;margin-bottom:20px;
}
.modal-visual{height:160px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.modal-body-inner{padding:16px 20px 20px}
.modal-to{font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;opacity:.7}
.modal-name{font-size:22px;font-weight:700;margin-bottom:10px}
.modal-msg{font-size:14px;line-height:1.9;opacity:.8;margin-bottom:12px}
.modal-from{font-size:12px;opacity:.6}
.modal-info{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.info-item{background:#0d0800;border:1px solid #2a1808;border-radius:10px;padding:10px 12px}
.info-key{font-size:10px;color:#7a5a30;margin-bottom:3px;font-weight:500}
.info-val{font-size:13px;color:#f0e0c0;font-weight:600}
.modal-actions{display:flex;gap:8px}
.modal-btn-primary{
  flex:1;padding:12px;border-radius:10px;border:none;
  font-family:'Kanit',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;transition:all .2s;
}
.modal-btn-secondary{
  padding:12px 16px;border-radius:10px;
  background:#ffffff11;border:1px solid #ffffff22;color:#f0e0c0;
  font-family:'Kanit',sans-serif;font-size:14px;font-weight:500;cursor:pointer;
  transition:all .2s;
}
.modal-btn-secondary:hover{background:#ffffff1a}

/* Copy toast */
.copy-toast{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#1c1208ee;border:1px solid #c9a84c44;color:#ffd97a;
  padding:10px 24px;border-radius:99px;font-size:13px;font-weight:500;
  opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap;
}
.copy-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:#5a4020}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.5}
.empty-text{font-size:15px}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#0a0800}
::-webkit-scrollbar-thumb{background:#3a2810;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#c9a84c44}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-title">
      <div class="header-icon">🏮</div>
      <div class="header-text">
        <h1>Preview ธีมการ์ดทั้งหมด</h1>
        <p>ศาลเจ้าปึงเถ่ากงม่า ขอนแก่น · คลิกธีมเพื่อดูรายละเอียด</p>
      </div>
    </div>
    <div class="theme-count" id="theme-count">กำลังโหลด...</div>
  </div>
</div>

<div class="filter-bar">
  <span class="filter-label">หมวด:</span>
  <button class="filter-btn active" onclick="filterCat('all')" id="filter-all">ทั้งหมด</button>
  <div id="cat-filter-btns"></div>
  <div class="search-wrap">
    <input class="search-input" id="search-input" placeholder="🔍 ค้นหาธีม..." oninput="onSearch()">
  </div>
</div>

<div class="grid-wrap" id="grid-wrap">
  <div class="empty"><div class="empty-icon">🏮</div><div class="empty-text">กำลังโหลดธีม...</div></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal-box" id="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">—</div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-preview-card" id="modal-card">
      <div class="modal-visual" id="modal-visual"></div>
      <div class="modal-body-inner" id="modal-body"></div>
    </div>
    <div class="modal-info" id="modal-info"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<div class="copy-toast" id="copy-toast"></div>

<script>
// ── Safety check ──
if(typeof CARD_CATEGORIES === 'undefined'){
  document.getElementById('grid-wrap').innerHTML = '<div class="empty"><div class="empty-icon">❌</div><div class="empty-text">โหลด themes.js ไม่ได้<br><small>ตรวจสอบว่าไฟล์ themes.js อยู่ในโฟลเดอร์เดียวกัน</small></div></div>';
  throw new Error('CARD_CATEGORIES not found');
}

// ── Count total themes ──
let totalThemes = 0;
Object.values(CARD_CATEGORIES).forEach(cat => totalThemes += Object.keys(cat.themes).length);
document.getElementById('theme-count').textContent = `${totalThemes} ธีม`;

// ── Build category filter buttons ──
const catBtnWrap = document.getElementById('cat-filter-btns');
Object.entries(CARD_CATEGORIES).forEach(([catKey, cat]) => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.id = `filter-${catKey}`;
  btn.textContent = cat.label;
  btn.onclick = () => filterCat(catKey);
  catBtnWrap.appendChild(btn);
});

// ── Build theme grid ──
const gridWrap = document.getElementById('grid-wrap');
gridWrap.innerHTML = '';

Object.entries(CARD_CATEGORIES).forEach(([catKey, cat]) => {
  const section = document.createElement('div');
  section.className = 'cat-section';
  section.id = `cat-${catKey}`;

  const themeCount = Object.keys(cat.themes).length;
  section.innerHTML = `<div class="cat-title">${cat.label} <span class="cat-count">${themeCount} ธีม</span></div><div class="theme-grid" id="grid-${catKey}"></div>`;
  gridWrap.appendChild(section);

  const grid = section.querySelector(`#grid-${catKey}`);
  Object.entries(cat.themes).forEach(([themeKey, t]) => {
    const card = document.createElement('div');
    card.className = 'theme-card';
    card.dataset.cat = catKey;
    card.dataset.key = themeKey;
    card.dataset.label = t.label.toLowerCase();
    card.id = `card-${themeKey}`;

    // Pick icon from divIcon
    const icon = t.divIcon || '✦';
    const glowColor = t.glow || '#c9a84c18';
    const glowRgb = t.p ? `rgba(${t.p[0]},${t.p[1]},${t.p[2]},0.35)` : '#c9a84c33';
    const msgPreview = t.def ? t.def.split('\n').join(' · ') : '';

    card.style.background = t.card || t.bg || '#1a1005';
    card.style.borderColor = t.corner ? t.corner : '#2a1a08';

    card.innerHTML = `
      <div class="card-preview-top" style="background:${t.bg||'#100a02'}">
        <div class="card-glow-bg">
          <div class="card-glow-circle" style="background:radial-gradient(circle,${glowRgb} 0%,transparent 70%)"></div>
        </div>
        <div class="card-preview-icon">${icon}</div>
        <div class="card-preview-badge">${catKey}</div>
      </div>
      <div class="card-preview-body" style="background:${t.card||t.bg||'#1a1005'}">
        <div class="card-preview-label" style="color:${t.toName||'#f5e6c8'}">${t.label}</div>
        <div class="card-preview-occasion" style="color:${t.msg||'#c9a07a'}">${t.occasion||''}</div>
        <div class="card-preview-msg" style="color:${t.msg||'#c9a07a'}">${msgPreview}</div>
        <div class="card-preview-footer" style="border-color:${t.corner||'#2a1a08'}">
          <span class="card-preview-key" style="color:${t.toLabel||'#c9a84c88'}">${themeKey}</span>
          <button class="card-preview-use-btn" style="background:${t.btn||'#c9a84c'};color:${t.btnC||'#0d0800'}" onclick="event.stopPropagation();copyKey('${themeKey}','${t.label.replace(/'/g,"\\'")}')">คัดลอก key</button>
        </div>
      </div>
    `;

    card.addEventListener('click', () => openModal(themeKey, catKey));
    grid.appendChild(card);
  });
});

// ── Filter by category ──
let currentCat = 'all';
function filterCat(cat){
  currentCat = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`filter-${cat === 'all' ? 'all' : cat}`).classList.add('active');

  document.querySelectorAll('.cat-section').forEach(sec => {
    if(cat === 'all'){
      sec.style.display = '';
    } else {
      sec.style.display = sec.id === `cat-${cat}` ? '' : 'none';
    }
  });
  onSearch(); // reapply search
}

// ── Search ──
function onSearch(){
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  let visibleCount = 0;
  document.querySelectorAll('.theme-card').forEach(card => {
    const matchCat = currentCat === 'all' || card.dataset.cat === currentCat;
    const matchSearch = !q || card.dataset.label.includes(q) || card.dataset.key.includes(q);
    if(matchCat && matchSearch){
      card.classList.remove('hidden');
      visibleCount++;
    } else {
      card.classList.add('hidden');
    }
  });
  // hide empty sections
  document.querySelectorAll('.cat-section').forEach(sec => {
    if(currentCat !== 'all' && sec.style.display === 'none') return;
    const cards = sec.querySelectorAll('.theme-card:not(.hidden)');
    sec.style.display = cards.length > 0 ? '' : 'none';
  });
  document.getElementById('theme-count').textContent = `${visibleCount} / ${totalThemes} ธีม`;
}

// ── Open modal ──
function openModal(themeKey, catKey){
  const t = CARD_THEMES[themeKey];
  if(!t) return;
  const cat = CARD_CATEGORIES[catKey];

  document.getElementById('modal-title').textContent = t.label;
  document.getElementById('modal-title').style.color = t.divC || '#ffd97a';

  // preview card
  const cardEl = document.getElementById('modal-card');
  cardEl.style.background = t.card || t.bg;
  cardEl.style.border = `1px solid ${t.corner || '#c9a84c33'}`;

  const glowRgb = t.p ? `rgba(${t.p[0]},${t.p[1]},${t.p[2]},0.4)` : '#c9a84c33';
  document.getElementById('modal-visual').style.background = t.bg;
  document.getElementById('modal-visual').innerHTML = `
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">
      <div style="width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,${glowRgb} 0%,transparent 70%);animation:previewPulse 2s ease-in-out infinite"></div>
    </div>
    <div style="position:relative;z-index:2;font-size:52px">${t.divIcon||'✦'}</div>
  `;

  document.getElementById('modal-body').style.background = t.card || t.bg;
  document.getElementById('modal-body').innerHTML = `
    <div style="font-size:10px;letter-spacing:3px;color:${t.toLabel};margin-bottom:4px;font-weight:500">ถึง</div>
    <div style="font-size:20px;font-weight:700;color:${t.toName};text-shadow:${t.toShadow};margin-bottom:10px">คุณ</div>
    <div style="font-size:13px;color:${t.msg};line-height:1.9;margin-bottom:10px">${(t.def||'').replace(/\n/g,'<br>')}</div>
    <div style="font-size:11px;color:${t.from}">จาก <strong style="color:${t.fromN}">ผู้ส่ง</strong></div>
  `;

  document.getElementById('modal-info').innerHTML = `
    <div class="info-item">
      <div class="info-key">หมวดหมู่</div>
      <div class="info-val">${cat ? cat.label : catKey}</div>
    </div>
    <div class="info-item">
      <div class="info-key">Theme Key</div>
      <div class="info-val" style="font-family:monospace;font-size:12px">${themeKey}</div>
    </div>
    <div class="info-item">
      <div class="info-key">โอกาส</div>
      <div class="info-val" style="font-size:12px">${t.occasion||'—'}</div>
    </div>
    <div class="info-item">
      <div class="info-key">SVG Template</div>
      <div class="info-val" style="font-family:monospace;font-size:12px">${t.tpl||'—'}</div>
    </div>
  `;

  document.getElementById('modal-actions').innerHTML = `
    <button class="modal-btn-primary" style="background:${t.btn};color:${t.btnC}" onclick="copyKey('${themeKey}','${t.label.replace(/'/g,"\\'")}')">📋 คัดลอก key: ${themeKey}</button>
    <button class="modal-btn-secondary" onclick="closeModalDirect()">ปิด</button>
  `;

  document.getElementById('modal').classList.add('show');
}

function closeModal(e){
  if(e.target === document.getElementById('modal')) closeModalDirect();
}
function closeModalDirect(){
  document.getElementById('modal').classList.remove('show');
}

// ── Copy key ──
function copyKey(key, label){
  navigator.clipboard.writeText(key).then(() => {
    showToast(`คัดลอก "${key}" แล้ว ✓`);
  }).catch(() => {
    showToast(`key: ${key}`);
  });
}

function showToast(msg){
  const t = document.getElementById('copy-toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// keyboard close
document.addEventListener('keydown', e => {
  if(e.key === 'Escape') closeModalDirect();
});
</script>
</body>
</html>
