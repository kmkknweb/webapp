<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เปิดรับแจ้งเตือน</title>
</head>
<body style="font-family:sans-serif;text-align:center;padding:40px">

<h2>🔔 รับแจ้งเตือน</h2>
<p>กดปุ่มด้านล่างเพื่อเปิดรับแจ้งเตือน</p>

<button onclick="subscribeUser()" style="padding:15px 25px;font-size:16px">
  เปิดรับแจ้งเตือน
</button>

<p id="status"></p>

<script>
const VAPID_PUBLIC_KEY = 'BClrlIsycnGqCbfjt3DBcG6ER2CLWNVboIGBUzXv4JI3ksH263ZhFX8L0nCnltG4NWSNRDhKc1Sc5_7pkiYYerE';

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding)
    .replace(/-/g, '+')
    .replace(/_/g, '/');

  const rawData = atob(base64);
  return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
}

async function subscribeUser() {
  const status = document.getElementById('status');

  try {
    status.innerText = 'กำลังสมัคร...';

    const permission = await Notification.requestPermission();

    if (permission !== 'granted') {
      status.innerText = '❌ ไม่อนุญาตแจ้งเตือน';
      return;
    }

    await navigator.serviceWorker.register('./service-worker.js');
    const reg = await navigator.serviceWorker.ready;

    let sub = await reg.pushManager.getSubscription();
    if (sub) await sub.unsubscribe();

    sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });

    const res = await fetch('https://notifications-ebon.vercel.app/api/send-notification?action=subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(sub)
    });

    if (!res.ok) throw new Error('สมัครไม่สำเร็จ');

    status.innerText = '✅ สมัครสำเร็จแล้ว';

  } catch (err) {
    console.error(err);
    status.innerText = '❌ สมัครไม่สำเร็จ';
  }
}
</script>

</body>
</html>
