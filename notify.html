<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เปิดรับแจ้งเตือน</title>
</head><body style="margin:0;font-family:'Kanit',sans-serif;background:#0d0b10;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;">

  <div style="max-width:420px;width:100%;padding:24px;text-align:center">

    <!-- โลโก้ -->
    <img src="./agong.png" style="width:120px;height:120px;border-radius:50%;box-shadow:0 0 30px rgba(242,196,107,0.3);margin-bottom:20px;">

    <!-- หัวข้อ -->
    <h2 style="margin:0 0 10px;font-size:24px;color:#ffe5b1;">
      🔔 เปิดรับแจ้งเตือน
    </h2>

    <!-- คำอธิบาย -->
    <p style="color:#e3d8d0;line-height:1.8;margin-bottom:24px;">
      รับข่าวสารกิจกรรมสำคัญ<br>
      โปรโมชั่น และประกาศจากศาลเจ้า<br>
      ได้ทันทีบนมือถือของคุณ
    </p>

    <!-- ปุ่ม -->
    <button onclick="subscribeUser()" 
      style="
        width:100%;
        padding:16px;
        font-size:16px;
        font-weight:bold;
        border:none;
        border-radius:16px;
        background:linear-gradient(135deg,#f7d38b,#e6b85c);
        color:#2b1b05;
        box-shadow:0 10px 25px rgba(242,196,107,0.3);
        cursor:pointer;
      ">
      🔔 เปิดรับแจ้งเตือน
    </button>

    <!-- สถานะ -->
    <p id="status" style="margin-top:16px;font-size:14px;color:#ffe5b1;"></p>

    <!-- หมายเหตุ -->
    <p style="margin-top:20px;font-size:12px;color:#aaa;line-height:1.6;">
      คุณสามารถปิดการแจ้งเตือนได้ทุกเมื่อ<br>
      ผ่านการตั้งค่าในอุปกรณ์ของคุณ
    </p>

  </div>

</body>

<script>
const VAPID_PUBLIC_KEY = 'BEKZqk7DqYA6PrsqanHfDQjDmvNPnQGvClusMMzY8mSCoNYziJuNkifMWokKFBPU3wFxcPlBlwVYr3T0Ah90cng';

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding)
    .replace(/-/g, '+')
    .replace(/_/g, '/');
  const rawData = atob(base64);
  return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
}

async function subscribeUser() {
  const status = document.getElementById('status');
  try {
    status.innerText = 'กำลังสมัคร...';

    const permission = await Notification.requestPermission();
    if (permission !== 'granted') {
      status.innerText = '❌ ไม่อนุญาตแจ้งเตือน';
      return;
    }

    await navigator.serviceWorker.register('./service-worker.js');
    const reg = await navigator.serviceWorker.ready;

    // บังคับ unsubscribe เก่าแล้ว subscribe ใหม่เสมอ
    // เพื่อให้แน่ใจว่าใช้ VAPID key ล่าสุดเสมอ
    let sub = await reg.pushManager.getSubscription();
    if (sub) {
      await sub.unsubscribe();
      status.innerText = 'กำลังต่ออายุการสมัคร...';
    }

    sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });

    status.innerText = 'กำลังส่งข้อมูลไป server...';
    const res = await fetch(
      'https://notifications-ebon.vercel.app/api/send-notification?action=subscribe',
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(sub)
      }
    );

    if (!res.ok) {
      const txt = await res.text();
      throw new Error(`server ตอบ ${res.status}: ${txt}`);
    }

    status.innerText = '✅ สมัครสำเร็จแล้ว';

  } catch (err) {
    console.error(err);
    status.innerText = '❌ สมัครไม่สำเร็จ: ' + err.message;
  }
}
</script>

</body>
</html>
