<!DOCTYPE html>
<html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ติดตั้งแอปอากงอาม่า</title><link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&display=swap" rel="stylesheet"><style>body{font-family:Kanit,sans-serif;background:#111;color:#fff;margin:0;padding:20px;max-width:500px} .card{background:#1c1c1c;padding:18px;border-radius:18px;margin-bottom:14px} button{padding:14px 16px;border:none;border-radius:14px;background:#f2c46b;font-weight:700}</style></head><body><div class="card"><h2>ติดตั้งแอปอากงอาม่า</h2><p>กดปุ่มด้านล่างเพื่อติดตั้งแอป หากเครื่องไม่รองรับ ระบบจะแสดงวิธีเพิ่มไปหน้าจอหลักแทน</p><button id="installBtn" hidden>ติดตั้งแอป</button><p id="fallback">Android: กดเมนู ⋮ แล้วเลือก เพิ่มไปหน้าจอหลัก<br>iPhone/iPad: กด Share แล้วเลือก Add to Home Screen</p><p><a href="./index.html" style="color:#ffe5b1">เปิดแอป</a></p></div><script>let deferredPrompt; const btn=document.getElementById('installBtn'); const fb=document.getElementById('fallback'); window.addEventListener('beforeinstallprompt',e=>{e.preventDefault(); deferredPrompt=e; btn.hidden=false; fb.style.display='none';}); btn.addEventListener('click',async()=>{if(!deferredPrompt) return; deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; btn.hidden=true;});</script></body></html>
