<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>อากงอาม่าออนไลน์</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <style>
    :root{
      --bg:#0d0b10;
      --panel:#17131d;
      --panel-2:#1e1827;
      --text:#fff6eb;
      --muted:#d7c8bc;
      --gold:#f2c46b;
      --gold-2:#ffe5b1;
      --red:#c91f3d;
      --pink:#ff5fa3;
      --purple:#7d4cff;
      --line:rgba(255,255,255,.09);
      --shadow:0 18px 40px rgba(0,0,0,.38);
      --radius:24px;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;padding:0;min-height:100%;
      background:radial-gradient(circle at top,#44101f 0%, #1a1020 34%, #0d0b10 100%);
      color:var(--text);
      font-family:'Kanit',sans-serif;
      overflow-x:hidden;
    }
    .bg-orb{
      position:fixed;border-radius:999px;filter:blur(70px);pointer-events:none;opacity:.2;z-index:0;
      animation:floatOrb 10s ease-in-out infinite;
    }
    .orb1{width:200px;height:200px;left:-60px;top:80px;background:var(--red)}
    .orb2{width:230px;height:230px;right:-80px;top:180px;background:var(--purple);animation-delay:1.6s}
    .orb3{width:170px;height:170px;left:40%;bottom:100px;background:var(--gold);animation-delay:3s}
    .app{position:relative;z-index:2;max-width:460px;margin:0 auto;padding:18px 14px 24px}

    /* ── Bottom Nav Bar ── */
    .bottom-nav{
      position:fixed;bottom:0;left:0;right:0;z-index:100;
      display:flex;justify-content:space-around;align-items:center;
      background:rgba(13,11,16,.92);
      backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
      border-top:1px solid rgba(255,255,255,.1);
      padding:8px 0 max(8px,env(safe-area-inset-bottom));
      max-width:460px;margin:0 auto;
    }
    .bottom-nav-wrap{
      position:fixed;bottom:0;left:0;right:0;z-index:99;
      background:rgba(13,11,16,.92);
      backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
      border-top:1px solid rgba(255,255,255,.1);
    }
    .nav-item{
      display:flex;flex-direction:column;align-items:center;gap:4px;
      padding:6px 4px;cursor:pointer;border:none;background:none;
      color:#d7c8bc;font-family:'Kanit',sans-serif;transition:.15s ease;
      -webkit-tap-highlight-color:transparent;flex:1;
    }
    .nav-item.active{color:#f2c46b;}
    .nav-icon{font-size:24px;line-height:1;}
    .nav-label{font-size:11px;font-weight:500;letter-spacing:.2px;white-space:nowrap;}
    .nav-item.active .nav-label{color:#f2c46b;}

    /* ── Tab Pages ── */
    .tab-page{display:none;}
    .tab-page.active{display:block;}
    .tab-iframe-page{display:none;position:fixed;top:0;left:0;right:0;bottom:60px;z-index:80;}
    .tab-iframe-page.active{display:block;}
    .tab-iframe-page iframe{width:100%;height:100%;border:none;display:block;}
    .hero{text-align:center;padding:8px 6px 20px}
    .hero-badge{
      display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:999px;background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);color:var(--gold-2);font-size:11px;letter-spacing:.8px;backdrop-filter:blur(10px);
      box-shadow:0 0 0 1px rgba(242,196,107,.08),0 0 30px rgba(201,31,61,.08);
    }
    .hero-photo-wrap{width:220px;height:220px;margin:20px auto 10px;position:relative;display:grid;place-items:center}
    .hero-ring{
      position:absolute;inset:0;border-radius:50%;
      background:radial-gradient(circle, rgba(255,229,177,.32) 0%, rgba(201,31,61,.18) 34%, rgba(125,76,255,.18) 58%, transparent 74%);
      animation:pulse 4s ease-in-out infinite;
    }
    .hero-photo{
      position:relative;width:184px;height:184px;border-radius:50%;object-fit:cover;display:block;
      border:3px solid rgba(255,255,255,.13);
      box-shadow:0 20px 44px rgba(0,0,0,.36),0 0 38px rgba(242,196,107,.16);
      animation:floatHero 4.5s ease-in-out infinite;
      background:#2a1b12;
    }
    .hero-title{margin:8px 0 6px;font-size:32px;line-height:1.08;font-weight:800;letter-spacing:-.02em}
    .hero-sub{margin:0 auto;max-width:320px;color:var(--muted);font-size:14px;line-height:1.75}
    .hero-tags{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;margin-top:12px;font-size:12px;color:var(--gold-2)}
    .menu-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:16px}
    .menu-btn{
      background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));
      border:1px solid var(--line);border-radius:20px;padding:14px 10px;color:var(--text);font-family:'Kanit',sans-serif;
      box-shadow:var(--shadow);cursor:pointer
    }
    .menu-btn strong{display:block;font-size:15px}
    .menu-btn span{display:block;font-size:12px;color:var(--muted);margin-top:4px}
    .card{
      background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.04));
      border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px;
      box-shadow:var(--shadow);backdrop-filter:blur(12px);
    }
    .section-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
    .section-head h2{margin:0;font-size:19px;font-weight:700}
    .mini-btn,.primary-btn,.secondary-btn,.ghost-btn,.amount-btn,.category-btn,.share-btn{
      font-family:'Kanit',sans-serif;border:none;cursor:pointer
    }
    .mini-btn{
      padding:9px 12px;border-radius:12px;background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--gold-2);font-size:12px
    }
    .primary-btn{
      padding:14px;border-radius:16px;background:linear-gradient(135deg,var(--gold),var(--gold-2));color:#23160d;font-size:15px;font-weight:700
    }
    .secondary-btn{
      padding:14px;border-radius:16px;background:linear-gradient(135deg,var(--red),var(--pink));color:#fff;font-size:15px;font-weight:700
    }
    .ghost-btn{
      padding:14px;border-radius:16px;background:rgba(255,255,255,.06);color:#fff;border:1px solid var(--line);font-size:15px;font-weight:600
    }
    .stack{display:grid;grid-template-columns:1fr;gap:10px}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .grid-4{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .daily-date{font-size:12px;color:var(--gold-2);margin-bottom:6px}
    .fortune-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .tag{padding:7px 12px;border-radius:999px;font-size:12px;background:rgba(255,255,255,.05);border:1px solid var(--line)}
    .tag.gold{color:var(--gold-2)}
    .fortune-text,.bless-text,.notice-inline{margin:0;font-size:15px;line-height:1.85}
    .fortune-text{margin-bottom:12px}
    .score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .score-box{background:rgba(0,0,0,.18);border:1px solid var(--line);border-radius:14px;padding:10px 6px;text-align:center}
    .score-box span{display:block;font-size:10px;color:var(--muted);margin-bottom:4px}
    .score-box strong{font-size:15px;color:var(--gold-2)}
    .category-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
    .category-btn{
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:14px 10px;border-radius:18px;
      background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));color:var(--text);border:1px solid var(--line)
    }
    .category-btn.active{background:linear-gradient(135deg,rgba(242,196,107,.24),rgba(201,31,61,.16))}
    .category-icon{font-size:24px}
    .category-label{font-size:13px;line-height:1.4}
    .result-box{
      background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:18px;padding:16px;margin-top:12px
    }
    .result-kicker{font-size:11px;color:var(--gold-2);letter-spacing:1px;margin-bottom:6px}
    .result-title{font-size:18px;font-weight:700;margin-bottom:8px}
    .amount-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
    .amount-btn{
      padding:12px;border-radius:14px;background:rgba(255,255,255,.04);color:var(--text);border:1px solid var(--line)
    }
    .amount-btn.active{background:linear-gradient(135deg,rgba(242,196,107,.24),rgba(201,31,61,.16))}
    .text-input{
      width:100%;padding:13px 14px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.04);
      color:var(--text);margin-bottom:10px;font:inherit
    }
    .text-input::placeholder{color:#baa896}
    .text-area{min-height:92px;resize:vertical}
    .upload-box{display:block;border:1px dashed rgba(255,255,255,.18);border-radius:18px;padding:16px;background:rgba(255,255,255,.03);margin-bottom:12px;cursor:pointer}
    .upload-placeholder{text-align:center;color:var(--muted)}
    .upload-placeholder span{display:block;font-size:14px;margin-bottom:3px}
    .upload-placeholder small{font-size:11px}
    .slip-preview{width:100%;max-height:230px;object-fit:cover;border-radius:14px;display:block}
    .hidden{display:none !important}
    .modal.hidden{display:none}
    .modal{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center}
    .modal-backdrop{position:absolute;inset:0;background:rgba(5,5,9,.72);backdrop-filter:blur(6px)}
    .modal-panel{
      position:relative;z-index:2;width:min(92vw,420px);max-height:88vh;overflow:auto;
      background:linear-gradient(180deg,#1a1221,#130f18);border:1px solid var(--line);border-radius:24px;padding:20px;box-shadow:0 22px 60px rgba(0,0,0,.45)
    }
    .modal-panel h3{margin:0 0 10px;font-size:24px}
    .modal-panel p{margin:0;color:var(--muted);line-height:1.8}
    .close-btn{
      position:absolute;right:10px;top:10px;width:34px;height:34px;border:none;border-radius:50%;background:rgba(255,255,255,.08);color:#fff;font-size:22px;cursor:pointer
    }
    .notice-panel{text-align:center}
    .notice-image{width:126px;height:126px;border-radius:50%;object-fit:cover;margin-bottom:10px;box-shadow:0 0 32px rgba(242,196,107,.16)}
    .payment-hero{display:flex;gap:12px;align-items:center;margin-bottom:14px}
    .payment-qr{width:156px;height:156px;border-radius:18px;background:#fff;padding:10px;flex:0 0 auto;box-shadow:0 12px 30px rgba(0,0,0,.25)}
    .payment-qr img{width:100%;height:100%;object-fit:contain;display:block;border-radius:10px}
    .payment-meta{flex:1}
    .payment-kicker{font-size:11px;letter-spacing:1px;color:var(--gold-2);margin-bottom:6px}
    .payment-bank{font-size:18px;font-weight:700;margin-bottom:4px}
    .payment-name{font-size:13px;color:var(--muted);line-height:1.7}
    .payment-account{margin-top:12px;padding:12px 14px;border-radius:16px;background:rgba(255,255,255,.05);border:1px solid var(--line)}
    .payment-account-label{font-size:11px;color:var(--gold-2);margin-bottom:4px}
    .payment-account-value{font-size:20px;font-weight:700;letter-spacing:.5px}
    .payment-tips{margin-top:12px;font-size:12px;color:var(--muted);line-height:1.8}
    .payment-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
    #renderTargetWrapper{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:18px;padding:10px}
    #renderTarget{display:flex;justify-content:center}
    .post-card,.certificate-card{
      width:100%;max-width:390px;border-radius:24px;overflow:hidden;position:relative;aspect-ratio:4/5; min-height:520px;
    }
    .post-card{
      background:
        radial-gradient(circle at 12% 8%, rgba(242,196,107,.28), transparent 22%),
        radial-gradient(circle at 82% 14%, rgba(201,31,61,.24), transparent 18%),
        radial-gradient(circle at 50% 100%, rgba(125,76,255,.20), transparent 20%),
        linear-gradient(145deg,#2a1116,#3c1421 36%,#171220 100%);
      border:1px solid rgba(255,255,255,.10);padding:22px;color:#fff;display:flex;flex-direction:column;justify-content:space-between
    }
    .certificate-card{
      background:linear-gradient(180deg, rgba(255,244,230,.98), rgba(255,249,239,.98));
      border:4px solid #d7b168;padding:24px;color:#4b2d18;display:flex;flex-direction:column;justify-content:space-between
    }
    .post-top{display:flex;gap:12px;align-items:center;margin-bottom:16px}
    .post-avatar,.cert-avatar{width:78px;height:78px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.14)}
    .post-kicker{font-size:11px;letter-spacing:1px;color:#ffe2bf}
    .post-title{font-size:28px;line-height:1.1;margin:3px 0 4px;font-weight:800}
    .post-sub{font-size:12px;color:#f3d6c3}
    .post-message{
      background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:16px;font-size:17px;line-height:1.8;text-align:center
    }
    .post-sign{font-size:13px;line-height:1.8;color:#ffe6d3;margin-top:16px}
    .post-sign strong{font-size:18px;color:#ffde9b}
    .post-footer-date{font-size:11px;color:#f3d8c5;margin-top:8px;text-align:center}
    .cert-header{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px}
    .cert-avatar{border:3px solid #d7b168}
    .cert-title{text-align:center;font-size:26px;margin:0;color:#8a5315;font-weight:800}
    .cert-sub{text-align:center;margin:0 0 12px;color:#77502d;font-size:13px}
    .cert-body{text-align:center;border:1px solid #e7d1a1;border-radius:18px;padding:18px;background:rgba(255,252,246,.85)}
    .cert-name{font-size:24px;font-weight:700;margin:6px 0;color:#6c3b12}
    .cert-amount{font-size:18px;color:#8a5315;margin:10px 0}
    .cert-message{font-size:16px;line-height:1.9;color:#6b4d35}
    .cert-date{margin-top:14px;font-size:13px;color:#8a6d4f}
    .cert-footer{margin-top:14px;text-align:center;font-size:14px;color:#7d5632}
    .share-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
    @keyframes floatHero{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:.88}50%{transform:scale(1.05);opacity:1}}
    @keyframes floatOrb{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
    @media (max-width:380px){
      .menu-grid,.grid-2,.grid-4,.amount-grid,.payment-actions,.share-grid{grid-template-columns:1fr}
      .hero-title{font-size:28px}
      .payment-hero{flex-direction:column}
    }
  </style>
</head>

  <!-- Single Fixed Topbar -->
  <div id="fixedTopbar" style="
    display:none;
    position:fixed;top:0;left:0;right:0;
    height:64px;z-index:999;
    background:rgba(13,11,16,.98);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-bottom:2px solid rgba(242,196,107,.3);
    align-items:center;justify-content:center;
  ">
    <button onclick="switchTab('home')" style="
      position:absolute;left:10px;
      background:rgba(242,196,107,.15);
      border:1.5px solid rgba(242,196,107,.4);
      border-radius:14px;
      color:#f2c46b;
      font-family:'Kanit',sans-serif;
      font-size:16px;font-weight:700;
      cursor:pointer;
      padding:10px 18px;
      display:flex;align-items:center;gap:6px;
    ">← กลับ</button>
    <span id="fixedTopbarTitle" style="
      font-size:18px;font-weight:700;
      color:#ffe5b1;
      font-family:'Kanit',sans-serif;
      letter-spacing:.3px;
    "></span>
  </div>

<script>
/* ── Tab switching — must load before body renders ── */
const BASE_URL = 'https://kmkknweb.github.io/webpage/';
const URLS = {
  activity: './activity.html',
  blessing: BASE_URL + 'daily-blessing.html',
  donation: BASE_URL + 'donation.html',
  deities:  BASE_URL + 'deities.html',
  tour:     'https://kmkknweb.github.io/Virtualtour/',
  social:   BASE_URL + 'activities.html',
};
const _tabs = ['home','activity','blessing','donation','deities','tour','social'];
const iframeIds = {
  activity:'iframeActivity', blessing:'iframeBlessing',
  donation:'iframeDonation', deities:'iframeDeities',
  tour:'iframeTour', social:'iframeSocial',
};
let iframesLoaded = {};
function stopIframeAudio(iframeEl){
  if(!iframeEl) return;
  /* วิธี 1: reload iframe ใหม่เป็น blank → หยุดเสียงทันที */
  try { iframeEl.contentWindow.postMessage('stop','*'); } catch(e){}
  /* วิธี 2: เปลี่ยน src เป็น about:blank แล้วโหลดของจริงใหม่เมื่อกลับมา */
  const prevSrc = iframeEl.src;
  if(prevSrc && prevSrc !== 'about:blank'){
    iframeEl.dataset.prevSrc = prevSrc;
  }
  iframeEl.src = 'about:blank';
}

let currentTab = 'home';

function switchTab(tab){
  /* หยุดเสียง iframe ของ tab ที่กำลังจะออก */
  if(currentTab !== tab && currentTab !== 'home'){
    const prevId = iframeIds[currentTab];
    const prevEl = prevId ? document.getElementById(prevId) : null;
    if(prevEl){
      stopIframeAudio(prevEl);
      iframesLoaded[currentTab] = false;
    }
  }
  currentTab = tab;

  /* แสดง/ซ่อน fixed topbar และอัพเดท title */
  const topbar = document.getElementById('fixedTopbar');
  const topbarTitle = document.getElementById('fixedTopbarTitle');
  const titles = {
    activity: '🎁 กิจกรรมประจำสัปดาห์',
    blessing: '🪷 ขอพรและดูดวง',
    donation: '🧧 ร่วมทำบุญ',
    deities:  '⛩️ องค์เทพในศาลเจ้า',
    tour:     '🌐 Virtual Tour 360°',
    social:   '🫶 กิจกรรมเพื่อสังคม',
  };
  if(topbar){
    if(tab === 'home'){
      topbar.style.display = 'none';
    } else {
      topbar.style.display = 'flex';
      if(topbarTitle) topbarTitle.textContent = titles[tab] || '';
    }
  }

  _tabs.forEach(t=>{
    const p=document.getElementById('tab-'+t);
    if(p) p.classList.toggle('active', t===tab);
  });
  if(URLS[tab] && !iframesLoaded[tab]){
    const el=document.getElementById(iframeIds[tab]);
    if(el) el.src=URLS[tab];
    iframesLoaded[tab]=true;
  }
  window.scrollTo(0,0);
}
</script>

    <!-- Dashboard การ์ด 6 ใบ -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px;">

      <button onclick="switchTab('deities')" style="
        background:linear-gradient(145deg,rgba(255,180,50,.2),rgba(242,196,107,.1));

        padding:22px 14px;text-align:center;cursor:pointer;

        transition:transform .15s ease;
      ">
        <div style="font-size:40px;margin-bottom:8px;">⛩️</div>
        <div style="font-size:16px;font-weight:700;color:var(--gold);">ไหว้องค์เทพออนไลน์</div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px;line-height:1.5;">รู้จักเทพในศาลเจ้า</div>

function thaiDate(date){
  const days=["อาทิตย์","จันทร์","อังคาร","พุธ","พฤหัสบดี","ศุกร์","เสาร์"];
  const months=["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
  return `วัน${days[date.getDay()]}ที่ ${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()+543}`;
}
function todayKey(){
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}
function getOrCreate(key, generator){
  const old = localStorage.getItem(key);
  if(old) return JSON.parse(old);
  const value = generator();
  localStorage.setItem(key, JSON.stringify(value));
  return value;
}
function randomFrom(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function escapeHtml(text){
  return String(text).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}

function renderCategoryGrid(targetId, items, clickHandler, activeKey){
  const wrap = $(targetId);
  wrap.innerHTML = "";
  items.forEach(item => {
    const btn = document.createElement("button");
    btn.className = "category-btn" + (activeKey === item.key ? " active" : "");
    btn.innerHTML = `<span class="category-icon">${item.icon}</span><span class="category-label">${item.label}</span>`;
    btn.onclick = () => clickHandler(item.key);
    wrap.appendChild(btn);
  });
}

async function captureBlob(){
  const capture = $("captureArea");
  const canvas = await html2canvas(capture, {backgroundColor:null, scale:2});
  return new Promise(resolve => canvas.toBlob(resolve, "image/png"));
}
async function downloadCurrentOutput(){
  const blob = await captureBlob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = currentDownloadName;
  a.click();
  URL.revokeObjectURL(url);
}
async function shareCurrentImage(){
  const blob = await captureBlob();
  const file = new File([blob], currentDownloadName, {type:"image/png"});
  if (navigator.share && navigator.canShare && navigator.canShare({files:[file]})) {
    await navigator.share({files:[file], title:"อากงอาม่า", text:"แชร์ภาพจากอากงอาม่า"});
  } else {
    alert("เครื่องนี้แชร์ภาพตรงไม่ได้ ให้กดดาวน์โหลดภาพหรือบันทึกภาพแทน");
  }
}
async function saveForFacebook(){
  await downloadCurrentOutput();
  alert("บันทึกภาพแล้ว จากนั้นเปิด Facebook แล้วเลือกโพสต์รูปนี้ได้เลย");
}

}

function savePaymentQr(){
  const a = document.createElement('a');
  a.href = $("paymentQrImage").src;
  a.download = "payment-qr.png";
  a.rel = "noopener";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}
  
function initNotice(){
  function applyNotice(data){
    if(!data) return;
    latestNoticeData = data;
    const summary = $("noticeSummary");
    const msg = $("noticeMessage");
    if(summary) summary.textContent = data.title || "ไม่มีประกาศในขณะนี้";
    if(msg) msg.textContent = data.message || "";
  }

  applyNotice(noticeData);

  if (db) {
    db.collection("settings").doc("notice").onSnapshot((doc) => {
      if (doc.exists) applyNotice(doc.data());
    }, (error) => {
      console.warn("Firestore notice listener failed:", error);
    });
  }
}


  
function safeOn(id,ev,fn){const el=$(id);if(el)el.addEventListener(ev,fn);}
if(document.querySelector('.amount-btn')){
  document.querySelectorAll('.amount-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const amount = btn.dataset.amount;
      if($("donationAmount")) $("donationAmount").value = amount === "0" ? "" : amount;
      if(amount === "0" && $("donationAmount")) $("donationAmount").focus();
    });
  });
}
safeOn("slipInput",'change',(e) => {
  const file = e.target.files && e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    if($("slipPreview")) $("slipPreview").src = ev.target.result;
    if($("slipPreview")) $("slipPreview").classList.remove('hidden');
    if($("slipPlaceholder")) $("slipPlaceholder").classList.add('hidden');
  };
  reader.readAsDataURL(file);
});
