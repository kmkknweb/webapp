<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>อากงอาม่าออนไลน์</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:radial-gradient(circle,#3a0f2b,#0f0f0f);
  color:white;
}

/* HERO */
.hero{
  text-align:center;
  padding:20px;
  animation:fadeIn 1s ease;
}
.hero img{
  width:150px;
  animation:float 4s infinite ease-in-out;
}
@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
  100%{transform:translateY(0)}
}
@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

/* CARD */
.card{
  margin:16px;
  padding:16px;
  border-radius:16px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  animation:fadeIn 1s ease;
}

button{
  padding:10px;
  border:none;
  border-radius:12px;
  color:white;
  background:linear-gradient(45deg,gold,orange);
  margin:5px;
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:center;
  align-items:center;
}
.hidden{display:none;}

.popup-box{
  background:#111;
  padding:20px;
  border-radius:20px;
  text-align:center;
  animation:fadeIn 0.5s ease;
}

/* CARD DESIGN */
.design{
  width:300px;
  padding:20px;
  background:black;
  color:white;
  border-radius:20px;
  text-align:center;
}
</style>
</head>

<body>

<!-- POPUP -->
<div id="popup" class="popup hidden">
  <div class="popup-box">
    <h3>🙏 อากงอาม่าให้พร</h3>
    <p>วันนี้เป็นวันดี เริ่มต้นสิ่งใหม่ได้</p>
    <button onclick="closePopup()">รับพร</button>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <img src="https://i.imgur.com/3ZQ3Z4C.png">
  <h2>อากงอาม่าออนไลน์</h2>
</div>

<!-- คำอวยพร -->
<div class="card">
<h3>✨ คำอวยพร</h3>
<p id="wish"></p>
<button onclick="randomWish()">สุ่มคำอวยพร</button>
</div>

<!-- ทำบุญ -->
<div class="card">
<h3>🙏 ทำบุญ</h3>
<input id="name" placeholder="ชื่อ"><br><br>
<input id="amount" placeholder="จำนวนเงิน"><br><br>

<button onclick="generateBless()">ออกใบอนุโมทนา</button>
<button onclick="generateCard()">สร้างการ์ดอวยพร</button>
</div>

<!-- OUTPUT -->
<div id="output" style="text-align:center;"></div>

<script>

/* POPUP */
setTimeout(()=>{
 document.getElementById("popup").classList.remove("hidden")
},1000)

function closePopup(){
 document.getElementById("popup").classList.add("hidden")
}

/* WISH 20+ */
const wishes = [
"สุขภาพแข็งแรง",
"ร่ำรวยเงินทอง",
"โชคลาภเข้ามา",
"สมหวังทุกสิ่ง",
"ปลอดภัยทุกวัน",
"ธุรกิจรุ่งเรือง",
"ครอบครัวมีสุข",
"จิตใจสงบ",
"ผ่านอุปสรรคได้",
"ชีวิตดีขึ้น",
"มีคนช่วยเหลือ",
"พบโอกาสใหม่",
"สมดั่งปรารถนา",
"เงินไหลมาเทมา",
"เจอสิ่งดีๆ",
"สำเร็จในงาน",
"มีความสุขทุกวัน",
"โชคดีตลอดปี",
"สุขสมหวัง",
"มั่งมีศรีสุข",
"เจริญรุ่งเรือง",
"ร่ำรวยมั่งคั่ง"
];

function randomWish(){
 const w = wishes[Math.floor(Math.random()*wishes.length)];
 document.getElementById("wish").innerText = w;
}
randomWish();

/* GENERATE CARD */
function generateCard(){
 const name = document.getElementById("name").value;
 const wish = document.getElementById("wish").innerText;

 const html = `
 <div class="design" id="card">
  <h3>🙏 อากงอาม่า</h3>
  <p>${name}</p>
  <p>${wish}</p>
 </div>
 <br>
 <button onclick="download('card')">ดาวน์โหลด</button>
 `;

 document.getElementById("output").innerHTML = html;
}

/* GENERATE BLESS */
function generateBless(){
 const name = document.getElementById("name").value;
 const amount = document.getElementById("amount").value;

 const html = `
 <div class="design" id="bless">
  <h3>ใบอนุโมทนา</h3>
  <p>${name}</p>
  <p>จำนวน ${amount} บาท</p>
 </div>
 <br>
 <button onclick="download('bless')">ดาวน์โหลด</button>
 `;

 document.getElementById("output").innerHTML = html;
}

/* DOWNLOAD */
function download(id){
 html2canvas(document.getElementById(id)).then(canvas=>{
  const a = document.createElement("a");
  a.href = canvas.toDataURL();
  a.download = "image.png";
  a.click();
 });
}

</script>

</body>
</html>
