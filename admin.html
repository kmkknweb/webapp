<!DOCTYPE html>
<html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Notice Editor</title><link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&display=swap" rel="stylesheet"><style>body{font-family:Kanit,sans-serif;background:#111;color:#fff;margin:0;padding:20px;max-width:700px}.card{background:#1c1c1c;padding:18px;border-radius:18px;margin-bottom:14px} input,textarea,select{width:100%;padding:12px;border-radius:12px;border:none;margin-top:8px} button{padding:12px 14px;border:none;border-radius:12px;background:#f2c46b;font-weight:700;margin-top:10px} pre{white-space:pre-wrap;background:#000;padding:14px;border-radius:12px}</style></head><body><div class="card"><h2>Notice Editor</h2><label>Version<input id="version" type="number" value="1"></label><label>Show<select id="show"><option value="true">true</option><option value="false">false</option></select></label><label>Title<input id="title" value="🙏 กิจกรรมวันนี้จากอากงอาม่า"></label><label>Message<textarea id="message" rows="6">วันนี้เหมาะกับการขอพรเรื่องการงาน การเรียน และการเริ่มต้นสิ่งใหม่ ใครยังไม่ได้ขอพรสามารถกดเลือกหมวดที่ต้องการได้เลย</textarea></label><button onclick="generateJson()">สร้าง notice.json</button><button onclick="copyJson()">คัดลอก JSON</button><button onclick="downloadJson()">ดาวน์โหลด notice.json</button></div><div class="card"><h3>ผลลัพธ์</h3><pre id="output"></pre></div><script>function currentObj(){return {version:Number(document.getElementById('version').value),show:document.getElementById('show').value==='true',title:document.getElementById('title').value,message:document.getElementById('message').value}} function generateJson(){document.getElementById('output').textContent=JSON.stringify(currentObj(),null,2)} async function copyJson(){generateJson(); await navigator.clipboard.writeText(document.getElementById('output').textContent); alert('คัดลอกแล้ว')} function downloadJson(){generateJson(); const blob=new Blob([document.getElementById('output').textContent],{type:'application/json'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='notice.json'; a.click(); URL.revokeObjectURL(url)} generateJson();</script></body></html>
