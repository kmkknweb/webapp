<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ค้นหารหัส Time Capsule</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Kanit',sans-serif;
  background:radial-gradient(circle,#8f1d1d,#1a0303);
  color:#fff;
  overflow:hidden;
}

/* layout */
.container{
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
}

/* agong */
.agong{
  width:140px;
  animation:float 3s infinite ease-in-out;
  filter:drop-shadow(0 0 30px gold);
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-12px)}
}

/* input */
input{
  margin-top:20px;
  padding:15px;
  border-radius:15px;
  border:none;
  text-align:center;
  font-size:18px;
  width:260px;
}

/* button */
button{
  margin-top:12px;
  padding:14px 26px;
  border:none;
  border-radius:999px;
  font-size:16px;
  font-family:'Kanit',sans-serif;
  cursor:pointer;
  background:linear-gradient(#fff0b3,#f1b93f);
  box-shadow:0 0 25px rgba(255,200,100,.6);
  transition:.3s;
}

button:hover{
  transform:scale(1.05);
}

/* result box */
.result{
  margin-top:20px;
  max-height:300px;
  overflow:auto;
  width:100%;
  max-width:350px;
}

/* item */
.item{
  background:#fff4cf;
  color:#4b220b;
  padding:15px;
  border-radius:15px;
  margin-top:10px;
  text-align:center;
}

/* code */
.code{
  font-size:20px;
  font-weight:bold;
  color:#8f1d1d;
}

/* mini buttons */
.mini{
  margin-top:8px;
  padding:8px 12px;
  font-size:14px;
}
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ค้นหารหัส Time Capsule</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Kanit',sans-serif;
  background:radial-gradient(circle,#8f1d1d,#1a0303);
  color:#fff;
  overflow:hidden;
}

.container{
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
}

.agong{
  width:140px;
  animation:float 3s infinite ease-in-out;
  filter:drop-shadow(0 0 30px gold);
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-12px)}
}

input{
  margin-top:20px;
  padding:15px;
  border-radius:15px;
  border:none;
  text-align:center;
  font-size:18px;
  width:260px;
}

button{
  margin-top:12px;
  padding:14px 26px;
  border:none;
  border-radius:999px;
  font-size:16px;
  font-family:'Kanit',sans-serif;
  cursor:pointer;
  background:linear-gradient(#fff0b3,#f1b93f);
  box-shadow:0 0 25px rgba(255,200,100,.6);
}

.result{
  margin-top:20px;
  max-height:320px;
  overflow:auto;
  width:100%;
  max-width:360px;
}

.item{
  background:#fff4cf;
  color:#4b220b;
  padding:15px;
  border-radius:15px;
  margin-top:10px;
  text-align:center;
}

.code{
  font-size:20px;
  font-weight:bold;
  color:#8f1d1d;
}

.meta{
  font-size:13px;
  margin-top:6px;
  color:#8a5a22;
}

.mini{
  margin-top:8px;
  padding:8px 12px;
  font-size:14px;
}

.back{
  background:rgba(255,255,255,0.2);
  color:#fff;
}
</style>
</head>

<body>

<div class="container">
  <img src="agong.png" class="agong">
  <h1>ค้นหารหัสคำอธิษฐาน</h1>

  <input id="emailInput" placeholder="กรอกอีเมล">

  <button onclick="findCapsules()">🔍 ค้นหา</button>
  <button class="back" onclick="goBack()">← กลับ</button>

  <div class="result" id="result"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBkGyIgB-LJci9yRx-C--ahW4yDngUYpZI",
  authDomain: "timecapsule-64914.firebaseapp.com",
  projectId: "timecapsule-64914"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function formatThaiDate(value){
  if(!value) return "";
  const date = value.toDate ? value.toDate() : new Date(value);
  return new Intl.DateTimeFormat('th-TH',{
    year:'numeric',month:'short',day:'numeric'
  }).format(date);
}

window.findCapsules = async function(){
  const email = document.getElementById("emailInput").value.trim().toLowerCase();
  const result = document.getElementById("result");

  result.innerHTML = "กำลังค้นหา...";

  try{
    const q = query(
      collection(db,"timeCapsules"),
      where("email","==",email),
      orderBy("createdAt","desc")   // 🔥 เรียงใหม่ → เก่า
    );

    const snap = await getDocs(q);

    if(snap.empty){
      result.innerHTML = "ไม่พบข้อมูล";
      return;
    }

    result.innerHTML = "";

    snap.forEach(doc=>{
      const data = doc.data();

      const div = document.createElement("div");
      div.className = "item";

      div.innerHTML = `
        <div class="code">${data.code}</div>

        <div class="meta">
          ${data.eventName || ""}<br>
          ${data.eventDate ? "วันที่งาน: " + data.eventDate : ""}<br>
          ${data.createdAt ? "ฝากเมื่อ: " + formatThaiDate(data.createdAt) : ""}
        </div>

        <button class="mini" onclick="copyCode('${data.code}')">คัดลอก</button>
        <button class="mini" onclick="openCode('${data.code}')">เปิด</button>
      `;

      result.appendChild(div);
    });

  }catch(e){
    console.error(e);
    result.innerHTML = "เกิดข้อผิดพลาด";
  }
}

window.copyCode = function(code){
  navigator.clipboard.writeText(code);
  alert("คัดลอกแล้ว");
}

window.openCode = function(code){
  window.location.href = "open_time_capsule.html?code=" + code;
}

window.goBack = function(){
  window.location.href = "open_time_capsule.html";
}
</script>

</body>
</html>
