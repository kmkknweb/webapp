<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เรื่องน่าสนใจประจำสัปดาห์</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0d0b10;
      --panel:#17131d;
      --text:#fff6eb;
      --muted:#d7c8bc;
      --gold:#f2c46b;
      --gold-2:#ffe5b1;
      --red:#c91f3d;
      --purple:#7d4cff;
      --line:rgba(255,255,255,.09);
      --shadow:0 18px 40px rgba(0,0,0,.38);
      --radius:24px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:'Kanit',sans-serif;
      background:radial-gradient(circle at top,#44101f 0%, #1a1020 34%, #0d0b10 100%);
      color:var(--text);
      min-height:100vh;
    }
    .app{
      max-width:460px;
      margin:0 auto;
      padding:18px 14px 40px;
    }
    .topbar{
      display:flex;
      gap:10px;
      margin-bottom:14px;
    }
    .back-btn{
      display:inline-block;
      padding:10px 16px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.09);
      color:var(--text);
      text-decoration:none;
      font-size:14px;
      font-weight:600;
    }
    .card{
      background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.04));
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:18px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(12px);
    }
    .kicker{
      font-size:12px;
      letter-spacing:.8px;
      color:var(--gold-2);
      margin-bottom:6px;
    }
    h1{
      margin:0 0 6px;
      font-size:28px;
      line-height:1.15;
    }
    .subtitle{
      color:var(--muted);
      font-size:14px;
      line-height:1.8;
      margin-bottom:16px;
    }
    .hero{
      width:100%;
      border-radius:20px;
      overflow:hidden;
      margin-bottom:16px;
      background:rgba(255,255,255,.05);
      border:1px solid var(--line);
      min-height:220px;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
    }
    .hero img{
      width:100%;
      height:220px;
      object-fit:cover;
      display:block;
    }
    .placeholder{
      text-align:center;
      color:var(--gold-2);
      font-size:18px;
      padding:30px 20px;
    }
    .content{
      font-size:16px;
      line-height:1.9;
      color:#fff6eb;
    }
    .nav{
      display:flex;
      gap:10px;
      margin-top:18px;
    }
    .nav button{
      flex:1;
      padding:14px;
      border:none;
      border-radius:16px;
      font-family:'Kanit',sans-serif;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
    }
    .prev-btn{
      background:rgba(255,255,255,.06);
      color:#fff;
      border:1px solid rgba(255,255,255,.09);
    }
    .next-btn{
      background:linear-gradient(135deg,var(--gold),var(--gold-2));
      color:#23160d;
    }
    .meta{
      margin-top:14px;
      text-align:center;
      color:var(--muted);
      font-size:13px;
    }

    .anim-shine::before,
    .anim-glow::before,
    .anim-float::before,
    .anim-fire::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      border-radius:20px;
    }

    .anim-shine::before{
      background:linear-gradient(120deg,transparent,rgba(255,255,255,.28),transparent);
      transform:translateX(-100%);
      animation:shine 3s infinite;
    }

    .anim-glow{
      box-shadow:0 0 0 rgba(242,196,107,.1);
      animation:glow 2.5s ease-in-out infinite;
    }

    .anim-float img{
      animation:floatImg 3s ease-in-out infinite;
    }

    .anim-fire::before{
      background:radial-gradient(circle at center, rgba(255,120,50,.15), transparent 60%);
      animation:firePulse 2s ease-in-out infinite;
    }

    @keyframes shine{
      0%{transform:translateX(-100%)}
      60%{transform:translateX(120%)}
      100%{transform:translateX(120%)}
    }
    @keyframes glow{
      0%,100%{box-shadow:0 0 12px rgba(242,196,107,.12)}
      50%{box-shadow:0 0 28px rgba(242,196,107,.28)}
    }
    @keyframes floatImg{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-6px)}
    }
    @keyframes firePulse{
      0%,100%{opacity:.5}
      50%{opacity:1}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <a href="./index.html" class="back-btn">← กลับหน้าหลัก</a>
    </div>

    <div class="card">
      <div class="kicker">เรื่องน่าสนใจประจำสัปดาห์</div>
      <h1 id="title">กำลังโหลด...</h1>
      <div class="subtitle" id="subtitle"></div>

      <div class="hero" id="heroBox">
        <div class="placeholder">กำลังโหลดภาพ...</div>
      </div>

      <div class="content" id="content"></div>

      <div class="nav">
        <button class="prev-btn" id="prevBtn">เรื่องก่อนหน้า</button>
        <button class="next-btn" id="nextBtn">เรื่องถัดไป</button>
      </div>

      <div class="meta" id="meta"></div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxkP1IgFhuXM8yGB-RzXBT0c-IepZAUDi832rok7fikhdTvoA9W-isCrDKJ81W7VAmg/exec";
    let interestData = [];
    let currentIndex = 0;

    function $(id){ return document.getElementById(id); }

    async function loadInterest(){
      try{
        const res = await fetch(`${SCRIPT_URL}?action=interest`);
        const json = await res.json();

        if(json.status !== "success" || !json.data || !json.data.length){
          throw new Error("โหลดข้อมูลไม่สำเร็จ");
        }

        interestData = json.data;
        renderInterest(0);
      }catch(err){
        $("title").textContent = "โหลดข้อมูลไม่สำเร็จ";
        $("subtitle").textContent = "";
        $("content").textContent = "กรุณาตรวจสอบ Apps Script, URL และข้อมูลในแท็บ interest";
        $("heroBox").innerHTML = `<div class="placeholder">ไม่พบข้อมูล</div>`;
        $("meta").textContent = "";
      }
    }

    function renderInterest(index){
      currentIndex = index;
      const item = interestData[index];

      $("title").textContent = item.title || "";
      $("subtitle").textContent = item.subtitle || "";
      $("content").textContent = item.content || "";
      $("meta").textContent = `เรื่อง ${index + 1} จาก ${interestData.length}`;

      const animClass = item.animation ? `anim-${item.animation}` : "";
      const imagePath = item.image || "";

      if(imagePath){
        $("heroBox").className = `hero ${animClass}`;
        $("heroBox").innerHTML = `<img src="${imagePath}" alt="${item.title || ""}">`;
      }else{
        $("heroBox").className = `hero ${animClass}`;
        $("heroBox").innerHTML = `<div class="placeholder">เรื่องน่าสนใจประจำสัปดาห์</div>`;
      }

      $("prevBtn").disabled = index === 0;
      $("nextBtn").disabled = index === interestData.length - 1;
      $("prevBtn").style.opacity = index === 0 ? ".45" : "1";
      $("nextBtn").style.opacity = index === interestData.length - 1 ? ".45" : "1";
    }

    $("prevBtn").addEventListener("click", () => {
      if(currentIndex > 0) renderInterest(currentIndex - 1);
    });

    $("nextBtn").addEventListener("click", () => {
      if(currentIndex < interestData.length - 1) renderInterest(currentIndex + 1);
    });

    loadInterest();
  </script>
</body>
  </html>
